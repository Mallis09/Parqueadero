<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Maricela Hernandez">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estacionamiento Premium</title>

    <link rel="stylesheet" href="parqueadero.css">
</head>

<body>

<main class="parking-card">

    <header class="card-header">
        <h1>✨ HITSS Parking Service</h1>
        <p>Gestión y liquidación de tarifas</p>
    </header>

    <section class="form-body">

        <!-- Información del Vehículo -->
        <fieldset class="form-group">
            <legend>Información del Vehículo</legend>

            <label for="selectTipo">Categoría</label>
            <select id="selectTipo">
                <option value="Automovil">🚗 Automóvil</option>
                <option value="Moto">🏍️ Motocicleta</option>
            </select>

            <label for="inputPlaca">Número de Placa</label>
            <input type="text" id="inputPlaca" placeholder="Ej. ABC123">
        </fieldset>

        <!-- Registro de tiempos -->
        <fieldset class="form-group">
            <legend>Registro de Tiempos</legend>

            <label for="horaIngreso">Momento de Entrada</label>
            <input type="datetime-local" id="horaIngreso">

            <label for="horaSalida">Momento de Salida</label>
            <input type="datetime-local" id="horaSalida">
        </fieldset>

        <button id="actionCalcular" class="btn btn-primary">
            Generar Liquidación
        </button>

        <!-- Pago -->
        <fieldset class="form-group block-pago">
            <legend>Caja de Pago</legend>

            <label for="montoEfectivo">Efectivo Recibido ($)</label>
            <input type="number" id="montoEfectivo" placeholder="0">
        </fieldset>

        <button id="actionPagar" class="btn btn-secondary">
            Procesar Pago
        </button>

        <!-- Estado -->
        <section id="panelConsola" class="panel-status dynamic-hide"></section>

    </section>

</main>

<script src="parqueadero.js"></script>

</body>
</html>
